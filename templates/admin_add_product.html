{% extends "base.html" %}
{% block content %}
<h2>Add Product</h2>
<form method="POST" enctype="multipart/form-data" class="admin-form">
    <input type="text" name="name" placeholder="Product Name" required>
    <input type="text" name="salt" placeholder="Combination / Salt / Formula" required>
    <input type="text" name="brand" placeholder="Brand Name" required>
    <select name="category" required>
        {% for c in categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
    </select>
    <input type="number" step="0.01" name="mrp" placeholder="MRP (₹)" required>
    <input type="number" step="0.01" name="ptr" placeholder="PTR (₹)" required>
    <input type="file" name="image">
    <label><input type="checkbox" name="is_new"> Mark as New Launch</label>
    <label><input type="checkbox" name="is_top"> Mark as Top Selling</label>
    <label><input type="checkbox" name="is_offer"> Mark as Offer/Scheme</label>
    <input type="text" name="offer_text" placeholder="Offer Text (if applicable)">
    <button type="submit" class="btn-primary">Save Product</button>
</form>
{% endblock %}
