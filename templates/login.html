{% extends "base.html" %}
{% block content %}
<div class="auth-box">
<h2>Retailer Login</h2>
<form method="POST">
    <input type="text" name="identifier" placeholder="Mobile Number or Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit" class="btn-primary">Login</button>
</form>
<p>New here? <a href="{{ url_for('signup') }}">Sign Up</a></p>
</div>
{% endblock %}
